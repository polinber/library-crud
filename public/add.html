<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить книгу</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
    <h1>📚 Добавление книги</h1>

    <form id="add-form">
        <input type="text" id="isbn" placeholder="ISBN (уникальный)" required>
        <input type="text" id="name" placeholder="Название" required>
        <input type="text" id="author" placeholder="Автор" required>
        <input type="number" id="pages" placeholder="Количество страниц">
        <input type="number" id="year" placeholder="Год издания">
        <button type="submit" class="btn btn-add">💾 Сохранить</button>
        <a href="/" class="btn">↩️ На главную</a>
    </form>

    <div id="message"></div>
</div>
<script src="/add.js"></script>
</body>
</html>
